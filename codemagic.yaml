workflows:
  ios-build:
    name: Healix iOS Build
    working_directory: CodemagicSample
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Expo prebuild (Generate iOS folder)
        script: npx expo prebuild --platform ios
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Build iOS and Generate IPA
        script: |
          cd ios
          WORKSPACE=$(ls | grep \.xcworkspace$ | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          
          # إجبار النظام إنه يحط الملف في فولدر build اللي قدامنا
          xcodebuild build -workspace "$WORKSPACE" -scheme "$SCHEME" -destination generic/platform=iOS CODE_SIGNING_ALLOWED=NO CONFIGURATION_BUILD_DIR=$(pwd)/build
          
          # تحويل الملف لصيغة ipa عشان Sideloadly
          cd build
          mkdir Payload
          mv *.app Payload/
          zip -r HealixApp.ipa Payload
    artifacts:
      - "**/*.ipa"
