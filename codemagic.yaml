workflows:
  ios-build:
    name: Healix iOS Build
    working_directory: CodemagicSample 
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Expo prebuild (Generate iOS folder)
        script: npx expo prebuild --platform ios
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Build iOS (Unsigned)
        script: |
          cd ios
          xcodebuild build -workspace HealixApp.xcworkspace -scheme HealixApp -destination generic/platform=iOS CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ios/build/**/*.app
